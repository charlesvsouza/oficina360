<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sa-grad" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ff7b2f"/>
    </linearGradient>
    <linearGradient id="sa-bg" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e1b10"/>
      <stop offset="100%" stop-color="#0f0f12"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="40" height="40" rx="10" fill="url(#sa-bg)"/>
  <rect width="40" height="40" rx="10" fill="url(#sa-grad)" fill-opacity="0.12"/>

  <!-- Sigma (Σ) correto: vértice no lado direito + seta curva para cima -->
  <!-- Barra superior -->
  <line x1="10" y1="9" x2="30" y2="9" stroke="url(#sa-grad)" stroke-width="2.8" stroke-linecap="round"/>
  <!-- Diagonal superior: esquerda → vértice direito-centro -->
  <line x1="11" y1="9.5" x2="28" y2="20.5" stroke="url(#sa-grad)" stroke-width="2.8" stroke-linecap="round"/>
  <!-- Diagonal inferior: vértice direito-centro → esquerda -->
  <line x1="28" y1="20.5" x2="11" y2="31" stroke="url(#sa-grad)" stroke-width="2.8" stroke-linecap="round"/>
  <!-- Barra inferior com curva suave para cima -->
  <path d="M 10 31.5 L 20 31.5 Q 30 31.5 31 22" stroke="url(#sa-grad)" stroke-width="2.8" stroke-linecap="round" fill="none"/>
  <!-- Seta apontando para cima -->
  <polyline points="27,25 31,21.5 35,25" stroke="url(#sa-grad)" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
