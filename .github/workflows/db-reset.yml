name: Reset & Seed Database (Railway)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Digite RESET para confirmar — TODOS os dados serão apagados'
        required: true

jobs:
  reset-db:
    name: Reset Database & Seed
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirm == 'RESET' }}

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Resolve public DATABASE_URL from Railway
        id: db-url
        run: |
          # Railway injeta variáveis localmente via "railway run env" usando o token
          # DATABASE_PUBLIC_URL é a URL acessível fora da rede interna do Railway
          DB_URL=$(railway variables --service sygmaauto-api 2>/dev/null \
            | grep -E "^DATABASE_PUBLIC_URL" | head -1 \
            | sed 's/^DATABASE_PUBLIC_URL[[:space:]]*=[[:space:]]*//')

          if [ -z "$DB_URL" ]; then
            # Fallback: tenta POSTGRES_URL ou DATABASE_URL sem sufixo se não encontrar
            DB_URL=$(railway variables --service sygmaauto-api 2>/dev/null \
              | grep -E "^POSTGRES_URL|^DATABASE_URL" | grep -v "internal" | head -1 \
              | sed 's/^[^=]*=[[:space:]]*//')
          fi

          if [ -z "$DB_URL" ]; then
            echo "::error::Não foi possível resolver DATABASE_PUBLIC_URL do Railway."
            echo "Adicione a secret DATABASE_PUBLIC_URL no repositório com a URL pública do PostgreSQL."
            railway variables --service sygmaauto-api 2>/dev/null | grep -i "data\|postgres\|db" || true
            exit 1
          fi

          echo "DATABASE_URL=$DB_URL" >> "$GITHUB_ENV"
          echo "URL resolvida com sucesso (primeiros 30 chars): ${DB_URL:0:30}..."
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Drop and recreate all tables
        run: npx prisma migrate reset --force --skip-seed

      - name: Run seed (planos + superadmin + tenants)
        run: npx ts-node prisma/seed.ts
        env:
          SEED_SUPERADMIN_PASSWORD: ${{ secrets.SEED_SUPERADMIN_PASSWORD }}
          SEED_MASTER_PASSWORD: ${{ secrets.SEED_MASTER_PASSWORD }}
